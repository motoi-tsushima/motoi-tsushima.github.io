<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 520" width="1600" height="520" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Light blue background with white snowflakes">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3d78b0"/>
      <stop offset="1" stop-color="#7fabd6"/>
    </linearGradient>
    <g id="arm" stroke="#ffffff" stroke-width="2" stroke-linecap="round" fill="none">
      <line x1="0" y1="0" x2="0" y2="-20"/>
      <line x1="0" y1="-12" x2="-6" y2="-17"/>
      <line x1="0" y1="-12" x2="6" y2="-17"/>
      <line x1="0" y1="-7" x2="-4" y2="-11"/>
      <line x1="0" y1="-7" x2="4" y2="-11"/>
    </g>
    <g id="flake">
      <use href="#arm" transform="rotate(0)"/>
      <use href="#arm" transform="rotate(60)"/>
      <use href="#arm" transform="rotate(120)"/>
      <use href="#arm" transform="rotate(180)"/>
      <use href="#arm" transform="rotate(240)"/>
      <use href="#arm" transform="rotate(300)"/>
    </g>
  </defs>
  <rect x="0" y="0" width="1600" height="520" fill="url(#sky)"/>
  <use href="#flake" transform="translate(140,90) scale(2.6)" opacity="0.5"/>
  <use href="#flake" transform="translate(360,300) scale(1.7)" opacity="0.4"/>
  <use href="#flake" transform="translate(560,120) scale(3.6)" opacity="0.28"/>
  <use href="#flake" transform="translate(760,360) scale(2.0)" opacity="0.45"/>
  <use href="#flake" transform="translate(920,90) scale(2.2)" opacity="0.5"/>
  <use href="#flake" transform="translate(1080,300) scale(3.0)" opacity="0.35"/>
  <use href="#flake" transform="translate(1240,150) scale(2.4)" opacity="0.55"/>
  <use href="#flake" transform="translate(1400,340) scale(3.4)" opacity="0.3"/>
  <use href="#flake" transform="translate(1500,100) scale(1.8)" opacity="0.55"/>
  <use href="#flake" transform="translate(1180,440) scale(1.6)" opacity="0.5"/>
  <use href="#flake" transform="translate(680,220) scale(1.3)" opacity="0.4"/>
  <use href="#flake" transform="translate(300,460) scale(2.0)" opacity="0.4"/>
  <use href="#flake" transform="translate(1330,470) scale(1.5)" opacity="0.5"/>
  <use href="#flake" transform="translate(980,430) scale(1.4)" opacity="0.45"/>
  <use href="#flake" transform="translate(480,430) scale(1.6)" opacity="0.4"/>
  <use href="#flake" transform="translate(1560,260) scale(2.2)" opacity="0.4"/>
</svg>
